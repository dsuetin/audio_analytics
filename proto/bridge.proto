syntax = "proto3";

package vad.bridge.v1;

service AudioBridge {
  rpc StreamMic(stream MicChunk) returns (stream VadEvent);
}

message MicChunk {
  string session_id = 1;
  bytes audio = 2;
  uint32 sample_rate = 3;
  bool is_begin = 4;
  bool is_end = 5;
}

message VadEvent {
  string session_id = 1;
  uint64 sequence = 2;
  bool is_begin = 3;
  bool is_end = 4;
}